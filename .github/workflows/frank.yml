name: Frank App

on:
  pull_request:
    paths:
      - 'samples/frank/**'
      - 'android/**'
      - 'ios/**'
      - 'flutter/**'
      - 'react-native/**'
  push:
    branches:
      - 'main'
      - 'cross-platform-sample-app'
    paths:
      - 'samples/frank/**'
      - 'android/**'
      - 'ios/**'
      - 'flutter/**'
      - 'react-native/**'

jobs:
  frank-android:
    name: Frank Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples/frank
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'gradle'
      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff
        with:
          channel: stable
          flutter-version: '3.41.0'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack
        run: corepack enable
      - name: Prepare Yarn
        run: corepack prepare yarn@3.6.1 --activate
      - name: Install React Native dependencies
        run: yarn install
        working-directory: samples/frank/react_native
      - name: Generate Flutter module files
        run: flutter pub get
        working-directory: samples/frank/flutter
      - name: Create google-services.json
        run: echo '${{ secrets.FRANK_APP_GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      - name: Setup Measure config
        run: |
          echo '${{ secrets.FRANK_APP_ENV }}' > .env
          ./setup-secrets.sh
      - name: Extract Firebase App IDs from google-services.json
        run: |
          echo "FIREBASE_ANDROID_APP_ID_DEBUG=$(jq -r '.client[] | select(.client_info.android_client_info.package_name == "sh.frankenstein.android.debug") | .client_info.mobilesdk_app_id' android/app/google-services.json)" >> $GITHUB_ENV
          echo "FIREBASE_ANDROID_APP_ID_RELEASE=$(jq -r '.client[] | select(.client_info.android_client_info.package_name == "sh.frankenstein.android") | .client_info.mobilesdk_app_id' android/app/google-services.json)" >> $GITHUB_ENV
      - name: Assemble debug
        run: ./gradlew :android:app:assembleDebug --no-daemon --no-parallel --no-configuration-cache --stacktrace
      - name: Assemble release
        run: ./gradlew :android:app:assembleRelease --no-daemon --no-parallel --no-configuration-cache --stacktrace
      - name: Publish debug APK to Firebase App Distribution
        if: github.event_name == 'push'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_ANDROID_APP_ID_DEBUG }}
          serviceCredentialsFileContent: ${{ secrets.FRANK_APP_FIREBASE_SERVICE_ACCOUNT }}
          file: samples/frank/android/app/build/outputs/apk/debug/app-debug.apk
          groups: measure-devs
      - name: Publish release APK to Firebase App Distribution
        if: github.event_name == 'push'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_ANDROID_APP_ID_RELEASE }}
          serviceCredentialsFileContent: ${{ secrets.FRANK_APP_FIREBASE_SERVICE_ACCOUNT }}
          file: samples/frank/android/app/build/outputs/apk/release/app-release.apk
          groups: measure-devs

  frank-ios:
    name: Frank iOS
    runs-on: macos-15
    permissions:
      contents: read
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Switch to Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app
      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff
        with:
          channel: stable
          flutter-version: '3.41.0'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack
        run: corepack enable
      - name: Prepare Yarn
        run: corepack prepare yarn@3.6.1 --activate
      - name: Install React Native dependencies
        run: yarn install
        working-directory: samples/frank/react_native
      - name: Generate Flutter module files
        run: flutter pub get
        working-directory: samples/frank/flutter
      - name: Create GoogleService-Info.plist files
        run: |
          mkdir -p samples/frank/ios/FrankensteinApp/Firebase/Debug
          mkdir -p samples/frank/ios/FrankensteinApp/Firebase/Release
          echo '${{ secrets.FRANK_APP_GOOGLE_SERVICE_INFO_PLIST_DEBUG }}' > samples/frank/ios/FrankensteinApp/Firebase/Debug/GoogleService-Info.plist
          echo '${{ secrets.FRANK_APP_GOOGLE_SERVICE_INFO_PLIST_RELEASE }}' > samples/frank/ios/FrankensteinApp/Firebase/Release/GoogleService-Info.plist
      - name: Setup Measure config
        run: |
          echo '${{ secrets.FRANK_APP_ENV }}' > samples/frank/.env
          cd samples/frank && ./setup-secrets.sh
      - name: Extract Firebase App IDs from GoogleService-Info.plist
        run: |
          echo "FIREBASE_IOS_APP_ID_DEBUG=$(/usr/libexec/PlistBuddy -c 'Print :GOOGLE_APP_ID' samples/frank/ios/FrankensteinApp/Firebase/Debug/GoogleService-Info.plist)" >> $GITHUB_ENV
          echo "FIREBASE_IOS_APP_ID_RELEASE=$(/usr/libexec/PlistBuddy -c 'Print :GOOGLE_APP_ID' samples/frank/ios/FrankensteinApp/Firebase/Release/GoogleService-Info.plist)" >> $GITHUB_ENV
      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: samples/frank/ios
      - name: Setup code signing
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/frank-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Import debug (development) certificate
          echo "${{ secrets.FRANK_APP_IOS_CERTIFICATE_P12_DEBUG }}" | base64 --decode > $RUNNER_TEMP/cert-debug.p12
          security import $RUNNER_TEMP/cert-debug.p12 -P "${{ secrets.FRANK_APP_IOS_CERTIFICATE_PASSWORD_DEBUG }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # Import release (distribution) certificate
          echo "${{ secrets.FRANK_APP_IOS_CERTIFICATE_P12_RELEASE }}" | base64 --decode > $RUNNER_TEMP/cert-release.p12
          security import $RUNNER_TEMP/cert-release.p12 -P "${{ secrets.FRANK_APP_IOS_CERTIFICATE_PASSWORD_RELEASE }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.FRANK_APP_IOS_PROVISIONING_PROFILE_DEBUG }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/frank-debug.mobileprovision
          echo "${{ secrets.FRANK_APP_IOS_PROVISIONING_PROFILE_RELEASE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/frank-release.mobileprovision
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
      - name: Archive debug
        run: |
          xcodebuild archive \
            -workspace samples/frank/ios/FrankensteinApp.xcworkspace \
            -scheme FrankensteinApp \
            -configuration Debug \
            -archivePath $RUNNER_TEMP/FrankensteinApp-Debug.xcarchive \
            -destination 'generic/platform=iOS'
      - name: Export debug IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/FrankensteinApp-Debug.xcarchive \
            -exportOptionsPlist samples/frank/ios/ExportOptions-Debug.plist \
            -exportPath $RUNNER_TEMP/frank-debug-ipa
      - name: Archive release
        run: |
          xcodebuild archive \
            -workspace samples/frank/ios/FrankensteinApp.xcworkspace \
            -scheme FrankensteinApp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/FrankensteinApp-Release.xcarchive \
            -destination 'generic/platform=iOS'
      - name: Export release IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/FrankensteinApp-Release.xcarchive \
            -exportOptionsPlist samples/frank/ios/ExportOptions-Release.plist \
            -exportPath $RUNNER_TEMP/frank-release-ipa
      - name: Publish debug IPA to Firebase App Distribution
        if: github.event_name == 'push'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_IOS_APP_ID_DEBUG }}
          serviceCredentialsFileContent: ${{ secrets.FRANK_APP_FIREBASE_SERVICE_ACCOUNT }}
          file: ${{ runner.temp }}/frank-debug-ipa/FrankensteinApp.ipa
          groups: measure-devs
      - name: Publish release IPA to Firebase App Distribution
        if: github.event_name == 'push'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_IOS_APP_ID_RELEASE }}
          serviceCredentialsFileContent: ${{ secrets.FRANK_APP_FIREBASE_SERVICE_ACCOUNT }}
          file: ${{ runner.temp }}/frank-release-ipa/FrankensteinApp.ipa
          groups: measure-devs
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $KEYCHAIN_PATH || true
