name: Frank App

on:
  pull_request:
    paths:
      - 'samples/frank/**'
      - 'android/**'
      - 'ios/**'
      - 'flutter/**'
      - 'react-native/**'
  push:
    branches:
      - 'main'
      - 'cross-platform-sample-app'
    paths:
      - 'samples/frank/**'
      - 'android/**'
      - 'ios/**'
      - 'flutter/**'
      - 'react-native/**'

jobs:
  frank-android:
    name: Frank Android (${{ matrix.build-type }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples/frank
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      matrix:
        build-type: [debug, release]
        include:
          - build-type: debug
            gradle-task: assembleDebug
            apk-path: samples/frank/android/app/build/outputs/apk/debug/app-debug.apk
            package-name: sh.frankenstein.android.debug
          - build-type: release
            gradle-task: assembleRelease
            apk-path: samples/frank/android/app/build/outputs/apk/release/app-release.apk
            package-name: sh.frankenstein.android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'gradle'
      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff
        with:
          channel: stable
          flutter-version: '3.41.0'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack
        run: corepack enable
      - name: Prepare Yarn
        run: corepack prepare yarn@3.6.1 --activate
      - name: Install React Native dependencies
        run: yarn install
        working-directory: samples/frank/react_native
      - name: Generate Flutter module files
        run: flutter pub get
        working-directory: samples/frank/flutter
      - name: Create google-services.json
        run: echo '${{ secrets.FRANK_APP_GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      - name: Setup Measure config
        run: |
          echo '${{ secrets.FRANK_APP_ENV }}' > .env
          ./setup-secrets.sh
      - name: Extract Firebase App ID from google-services.json
        run: |
          echo "FIREBASE_APP_ID=$(jq -r '.client[] | select(.client_info.android_client_info.package_name == "${{ matrix.package-name }}") | .client_info.mobilesdk_app_id' android/app/google-services.json)" >> $GITHUB_ENV
      - name: Assemble ${{ matrix.build-type }}
        run: ./gradlew :android:app:${{ matrix.gradle-task }} --no-daemon --no-parallel --no-configuration-cache --stacktrace
      - name: Publish ${{ matrix.build-type }} APK to Firebase App Distribution
        if: github.event_name == 'push'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FRANK_APP_FIREBASE_SERVICE_ACCOUNT }}
          file: ${{ matrix.apk-path }}
          groups: measure-devs

  frank-ios:
    name: Frank iOS (${{ matrix.build-type }})
    runs-on: macos-15
    permissions:
      contents: read
    timeout-minutes: 45
    strategy:
      matrix:
        build-type: [debug, release]
        include:
          - build-type: debug
            configuration: Debug
            export-options-plist: samples/frank/ios/ExportOptions-Debug.plist
            firebase-plist-path: samples/frank/ios/FrankensteinApp/Firebase/Debug/GoogleService-Info.plist
            certificate-p12-secret: FRANK_APP_IOS_CERTIFICATE_P12_DEBUG
            certificate-password-secret: FRANK_APP_IOS_CERTIFICATE_PASSWORD_DEBUG
            provisioning-profile-secret: FRANK_APP_IOS_PROVISIONING_PROFILE_DEBUG
          - build-type: release
            configuration: Release
            export-options-plist: samples/frank/ios/ExportOptions-Release.plist
            firebase-plist-path: samples/frank/ios/FrankensteinApp/Firebase/Release/GoogleService-Info.plist
            certificate-p12-secret: FRANK_APP_IOS_CERTIFICATE_P12_RELEASE
            certificate-password-secret: FRANK_APP_IOS_CERTIFICATE_PASSWORD_RELEASE
            provisioning-profile-secret: FRANK_APP_IOS_PROVISIONING_PROFILE_RELEASE
    steps:
      - uses: actions/checkout@v4
      - name: Switch to Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app
      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff
        with:
          channel: stable
          flutter-version: '3.41.0'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack
        run: corepack enable
      - name: Prepare Yarn
        run: corepack prepare yarn@3.6.1 --activate
      - name: Install React Native dependencies
        run: yarn install
        working-directory: samples/frank/react_native
      - name: Generate Flutter module files
        run: flutter pub get
        working-directory: samples/frank/flutter
      - name: Create GoogleService-Info.plist files
        run: |
          mkdir -p samples/frank/ios/FrankensteinApp/Firebase/Debug
          mkdir -p samples/frank/ios/FrankensteinApp/Firebase/Release
          echo '${{ secrets.FRANK_APP_GOOGLE_SERVICE_INFO_PLIST_DEBUG }}' > samples/frank/ios/FrankensteinApp/Firebase/Debug/GoogleService-Info.plist
          echo '${{ secrets.FRANK_APP_GOOGLE_SERVICE_INFO_PLIST_RELEASE }}' > samples/frank/ios/FrankensteinApp/Firebase/Release/GoogleService-Info.plist
      - name: Setup Measure config
        run: |
          echo '${{ secrets.FRANK_APP_ENV }}' > samples/frank/.env
          cd samples/frank && ./setup-secrets.sh
      - name: Extract Firebase App ID from GoogleService-Info.plist
        run: |
          echo "FIREBASE_APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :GOOGLE_APP_ID' ${{ matrix.firebase-plist-path }})" >> $GITHUB_ENV
      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: samples/frank/ios
      - name: Setup code signing
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/frank-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "${{ secrets[matrix.certificate-p12-secret] }}" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "${{ secrets[matrix.certificate-password-secret] }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets[matrix.provisioning-profile-secret] }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/frank-${{ matrix.build-type }}.mobileprovision
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
      - name: Archive ${{ matrix.build-type }}
        run: |
          xcodebuild archive \
            -workspace samples/frank/ios/FrankensteinApp.xcworkspace \
            -scheme FrankensteinApp \
            -configuration ${{ matrix.configuration }} \
            -archivePath $RUNNER_TEMP/FrankensteinApp-${{ matrix.configuration }}.xcarchive \
            -destination 'generic/platform=iOS'
      - name: Export ${{ matrix.build-type }} IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/FrankensteinApp-${{ matrix.configuration }}.xcarchive \
            -exportOptionsPlist ${{ matrix.export-options-plist }} \
            -exportPath $RUNNER_TEMP/frank-${{ matrix.build-type }}-ipa
      - name: Publish ${{ matrix.build-type }} IPA to Firebase App Distribution
        if: github.event_name == 'push'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FRANK_APP_FIREBASE_SERVICE_ACCOUNT }}
          file: ${{ runner.temp }}/frank-${{ matrix.build-type }}-ipa/FrankensteinApp.ipa
          groups: measure-devs
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $KEYCHAIN_PATH || true
