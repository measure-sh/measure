name: Frank App

on:
  pull_request:
    paths:
      - 'samples/frank/**'
      - 'android/**'
      - 'ios/**'
      - 'flutter/**'
      - 'react-native/**'
  push:
    branches:
      - 'main'
    paths:
      - 'samples/frank/**'
      - 'android/**'
      - 'ios/**'
      - 'flutter/**'
      - 'react-native/**'

env:
  JAVA_VERSION: '21'
  FLUTTER_VERSION: '3.41.0'
  YARN_VERSION: '3.6.1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frank-android:
    name: Frank Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples/frank
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate
      - name: Build Measure React Native SDK
        run: |
          yarn install
          npx bob build --target module
        working-directory: react-native
      - name: Install React Native dependencies
        run: yarn install
        working-directory: samples/frank/react_native
      - name: Generate Flutter module files
        run: flutter pub get
        working-directory: samples/frank/flutter
      - name: Create google-services.json
        run: echo '${{ secrets.FRANK_APP_GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      - name: Setup Measure config
        run: |
          echo '${{ secrets.FRANK_APP_ENV }}' > .env
          ./setup-secrets.sh
      - name: Extract Firebase App IDs from google-services.json
        run: |
          echo "FIREBASE_ANDROID_APP_ID_DEBUG=$(jq -r '.client[] | select(.client_info.android_client_info.package_name == "sh.frankenstein.android.debug") | .client_info.mobilesdk_app_id' android/app/google-services.json)" >> $GITHUB_ENV
          echo "FIREBASE_ANDROID_APP_ID_RELEASE=$(jq -r '.client[] | select(.client_info.android_client_info.package_name == "sh.frankenstein.android") | .client_info.mobilesdk_app_id' android/app/google-services.json)" >> $GITHUB_ENV
      - name: Assemble debug
        run: ./gradlew :android:app:assembleDebug --parallel --stacktrace
      - name: Assemble release
        if: github.ref == 'refs/heads/main'
        run: ./gradlew :android:app:assembleRelease --parallel --stacktrace
      - name: Publish debug APK to Firebase App Distribution
        if: github.ref == 'refs/heads/main'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_ANDROID_APP_ID_DEBUG }}
          serviceCredentialsFileContent: ${{ secrets.FRANK_APP_FIREBASE_SERVICE_ACCOUNT }}
          file: samples/frank/android/app/build/outputs/apk/debug/app-debug.apk
          groups: measure-devs
      - name: Publish release APK to Firebase App Distribution
        if: github.ref == 'refs/heads/main'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_ANDROID_APP_ID_RELEASE }}
          serviceCredentialsFileContent: ${{ secrets.FRANK_APP_FIREBASE_SERVICE_ACCOUNT }}
          file: samples/frank/android/app/build/outputs/apk/release/app-release.apk
          groups: measure-devs

  frank-ios:
    name: Frank iOS
    runs-on: macos-15
    permissions:
      contents: read
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Switch to Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app
      - uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate
      - name: Build Measure React Native SDK
        run: |
          yarn install
          npx bob build --target module
        working-directory: react-native
      - name: Install React Native dependencies
        run: yarn install
        working-directory: samples/frank/react_native
      - name: Generate Flutter module files
        run: flutter pub get
        working-directory: samples/frank/flutter
      - name: Create GoogleService-Info.plist
        run: |
          mkdir -p samples/frank/ios/FrankensteinApp/Firebase/Release
          echo '${{ secrets.FRANK_APP_GOOGLE_SERVICE_INFO_PLIST_RELEASE }}' > samples/frank/ios/FrankensteinApp/Firebase/Release/GoogleService-Info.plist
      - name: Setup Measure config
        run: |
          echo '${{ secrets.FRANK_APP_ENV }}' > samples/frank/.env
          cd samples/frank && ./setup-secrets.sh
      - name: Extract Firebase App ID from GoogleService-Info.plist
        run: |
          echo "FIREBASE_IOS_APP_ID_RELEASE=$(/usr/libexec/PlistBuddy -c 'Print :GOOGLE_APP_ID' samples/frank/ios/FrankensteinApp/Firebase/Release/GoogleService-Info.plist)" >> $GITHUB_ENV
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: samples/frank/ios/Pods
          key: pods-${{ hashFiles('samples/frank/ios/Podfile.lock', 'samples/frank/ios/Podfile') }}
          restore-keys: |
            pods-
      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: samples/frank/ios
      - name: Setup code signing
        if: github.ref == 'refs/heads/main'
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/frank-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Import release (distribution) certificate
          echo "${{ secrets.FRANK_APP_IOS_CERTIFICATE_P12_RELEASE }}" | base64 --decode > $RUNNER_TEMP/cert-release.p12
          security import $RUNNER_TEMP/cert-release.p12 -P "${{ secrets.FRANK_APP_IOS_CERTIFICATE_PASSWORD_RELEASE }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.FRANK_APP_IOS_PROVISIONING_PROFILE_RELEASE }}" | base64 --decode > $RUNNER_TEMP/profile-release.mobileprovision
          RELEASE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i $RUNNER_TEMP/profile-release.mobileprovision)")
          cp $RUNNER_TEMP/profile-release.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$RELEASE_UUID.mobileprovision
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
      - name: Generate version xcconfig
        run: |
          VERSION_NAME=$(grep '^VERSION_NAME=' samples/frank/version.properties | cut -d= -f2)
          VERSION_CODE=$(git rev-list --count HEAD)
          printf '// Auto-generated — do not edit\nMARKETING_VERSION = %s\nCURRENT_PROJECT_VERSION = %s\n' \
            "$VERSION_NAME" "$VERSION_CODE" \
            > samples/frank/ios/Generated.xcconfig
      - name: Build release
        if: github.ref != 'refs/heads/main'
        run: |
          xcodebuild build \
            -workspace samples/frank/ios/FrankensteinApp.xcworkspace \
            -scheme FrankensteinApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -parallelizeTargets \
            CODE_SIGNING_ALLOWED=NO
      - name: Archive release
        if: github.ref == 'refs/heads/main'
        run: |
          xcodebuild archive \
            -workspace samples/frank/ios/FrankensteinApp.xcworkspace \
            -scheme FrankensteinApp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/FrankensteinApp-Release.xcarchive \
            -destination 'generic/platform=iOS' \
            -parallelizeTargets \
            CODE_SIGNING_ALLOWED=NO
      - name: Export release IPA
        if: github.ref == 'refs/heads/main'
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/FrankensteinApp-Release.xcarchive \
            -exportOptionsPlist samples/frank/ios/ExportOptions-Release.plist \
            -exportPath $RUNNER_TEMP/frank-release-ipa
      - name: Publish release IPA to Firebase App Distribution
        if: github.ref == 'refs/heads/main'
        run: |
          echo '${{ secrets.FRANK_APP_FIREBASE_SERVICE_ACCOUNT }}' > $RUNNER_TEMP/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npm install -g firebase-tools
          firebase appdistribution:distribute "${{ runner.temp }}/frank-release-ipa/FrankensteinApp.ipa" \
            --app "${{ env.FIREBASE_IOS_APP_ID_RELEASE }}" \
            --groups measure-devs
      - name: Cleanup keychain
        if: always() && github.ref == 'refs/heads/main'
        run: security delete-keychain $KEYCHAIN_PATH || true
