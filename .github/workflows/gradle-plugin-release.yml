name: Release Android Gradle Plugin

on:
  push:
    tags:
      - 'android-gradle-plugin-v*'

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: 'temurin'
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  publish-android-gradle:
    name: Publish Android Gradle Plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/measure-android-gradle
    permissions:
      contents: write
      actions: write
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.SDK_RELEASE }}

      - uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Publish to Gradle Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PLUGIN_PORTAL_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PLUGIN_PORTAL_SECRET }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.MAVEN_ARTIFACT_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_ARTIFACT_SIGNING_PASSWORD }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: |
          ../gradlew publishPlugins

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: release-notes
        with:
          config: android/measure-android-gradle/cliff.toml
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --draft \
            ${{ contains(github.ref_name, '-') && '--prerelease' || ''}} \
            --notes "${{ steps.release-notes.outputs.content }}" \
            --verify-tag

      - name: Extract release metadata from PR
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          BODY=$(gh pr list --state merged --head "$TAG" --json body --jq '.[0].body' || true)
          NEXT_VERSION=$(echo "$BODY" | grep -oP '(?<=NEXT_VERSION=)\S+' || true)
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Trigger prepare-next workflow
        if: steps.meta.outputs.next_version != ''
        env:
          GH_TOKEN: ${{ secrets.SDK_RELEASE }}
        run: |
          gh workflow run "Prepare Next Android Gradle Plugin Version" \
            -f version="${{ steps.meta.outputs.next_version }}"
