name: Release Android SDK

on:
  push:
    tags:
      - 'android-v*'

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: 'temurin'
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  publish-android:
    name: Publish Android SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    permissions:
      contents: write
      actions: write
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.CHANGELOG_PUSH_TOKEN }}

      - uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Publish measure-android
        run: ./gradlew clean :measure:publish --no-daemon --no-parallel --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_ARTIFACT_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_ARTIFACT_SIGNING_PASSWORD }}

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: release-notes
        with:
          config: android/cliff.toml
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --draft \
            ${{ contains(github.ref_name, '-') && '--prerelease' || ''}} \
            --notes "${{ steps.release-notes.outputs.content }}" \
            --verify-tag

      - name: Extract release metadata from PR
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          BODY=$(gh pr list --state merged --head "$TAG" --json body --jq '.[0].body' || true)
          NEXT_VERSION=$(echo "$BODY" | grep -oP '(?<=NEXT_VERSION=)\S+' || true)
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Trigger prepare-next workflow
        if: steps.meta.outputs.next_version != ''
        env:
          GH_TOKEN: ${{ secrets.SDK_RELEASE }}
        run: |
          gh workflow run "Prepare Next Android Version" \
            -f version="${{ steps.meta.outputs.next_version }}"
