name: Dashboard

on:
  pull_request:
    paths:
      - .github/workflows/dashboard.yml
      - "frontend/dashboard/**"
      # The dashboard renders the docs: its prebuild copies docs/ into the
      # site and several test suites run against that content
      - "docs/**"
  push:
    branches:
      - "main"
    paths:
      - .github/workflows/dashboard.yml
      - "frontend/dashboard/**"
      - "docs/**"
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  NODE_VERSION: 24
  IMAGE_NAME: measure-sh/dashboard

permissions:
  contents: read

jobs:
  unit-test:
    name: Run dashboard unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/dashboard
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies for CI
        run: npm ci

      - name: Run Jest tests
        run: npm test

  format-check:
    name: Check dashboard formatting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/dashboard
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies for CI
        run: npm ci

      - name: Check Prettier formatting
        run: npm run format:check

  push:
    name: Build and push image
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    needs: [unit-test]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push OCI image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: frontend/dashboard
          file: frontend/dashboard/dockerfile
          build-contexts: |
            docs=docs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/measure-sh/measure/tree/${{ github.ref_name }}/frontend/dashboard/dockerfile
            org.opencontainers.image.description=Measure Dashboard App
            org.opencontainers.image.licenses=Apache-2.0

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
