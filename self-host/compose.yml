# Measure Docker Compose
#
# Guidelines
#
# Follow these guidelines for a consistently maintained
# compose file and a pleasurable maintainer experience.
#
# - Order first-party services at the top followed by
#   third-party services. Databases and other external
#   services should appear after measure services.
# - All environment variables MUST be passed using the
#   `environment` directive of each service. That's the
#   ONLY source of truth.
#
# Tips
#
# - For setting default values for any environment variable
#   Specify the default value after the hyphen (-). To set
#   empty default value do not specify anything after the
#   hyphen. See example below.
#
#   ```yaml
#   environment:
#     - MY_VAR=${MY_VAR:-default_value}
#     - EMPTY_MY_VAR=${EMPTY_MY_VAR:-}
#   ```

name: measure
services:
  dashboard:
    build:
      dockerfile: dockerfile
      context: ../frontend/dashboard
    ports:
      - "3000:3000"
    secrets:
      - llm-docs-chat-key
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - API_BASE_URL=${API_BASE_URL}
      - AGENT_BASE_URL=${AGENT_BASE_URL}
      - POSTHOG_HOST=${POSTHOG_HOST}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_AGENT_BASE_URL=${NEXT_PUBLIC_AGENT_BASE_URL}
      - NEXT_PUBLIC_INGEST_BASE_URL=${NEXT_PUBLIC_INGEST_BASE_URL}
      - NEXT_PUBLIC_IS_CLOUD=${NEXT_PUBLIC_IS_CLOUD}
      - NEXT_PUBLIC_BILLING_ENABLED=${BILLING_ENABLED}
      - NEXT_PUBLIC_OAUTH_GITHUB_KEY=${OAUTH_GITHUB_KEY}
      - NEXT_PUBLIC_OAUTH_GOOGLE_KEY=${OAUTH_GOOGLE_KEY}
      - NEXT_PUBLIC_POSTHOG_HOST=${POSTHOG_HOST}
      - NEXT_PUBLIC_POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - NEXT_PUBLIC_GTM_ID=${GTM_ID}
      - NEXT_PUBLIC_C15T_BACKEND_URL=${NEXT_PUBLIC_C15T_BACKEND_URL}
      - LLM_DOCS_CHAT_KEY_FILE=/run/secrets/llm-docs-chat-key
      - LLM_MODEL=${LLM_AGENT_MODEL_SMALL:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://0.0.0.0:3000"]
      interval: 5s
      timeout: 10s
      retries: 5
    develop:
      watch:
        - path: ../frontend/dashboard
          action: sync
          target: /app

  api:
    build:
      dockerfile: dockerfile
      context: ../backend/api
      additional_contexts:
        libs: ../backend/libs
      args:
        TARGETTYPE: debug
    ports:
      - "8080:8080"
    secrets:
      - postgres-dsn
      - clickhouse-dsn
      - clickhouse-reader-dsn
      - symbols-secret-access-key
      - attachments-secret-access-key
      - smtp-password
      - slack-client-secret
      - slack-signing-secret
      - slack-oauth-state-secret
      - ga4-measurement-protocol-secret
      - autumn-secret-key
      - autumn-webhook-secret
      - oauth-google-secret
      - oauth-github-secret
      - session-access-secret
      - session-refresh-secret
    environment:
      - BILLING_ENABLED=${BILLING_ENABLED}
      - AUTUMN_SECRET_KEY_FILE=/run/secrets/autumn-secret-key
      - AUTUMN_WEBHOOK_SECRET_FILE=/run/secrets/autumn-webhook-secret
      - POSTGRES_DSN_FILE=/run/secrets/postgres-dsn
      - CLICKHOUSE_DSN_FILE=/run/secrets/clickhouse-dsn
      - CLICKHOUSE_READER_DSN_FILE=/run/secrets/clickhouse-reader-dsn
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - IGGY_ADDR=${IGGY_ADDR}
      - IGGY_USERNAME=${IGGY_USERNAME}
      - IGGY_PASSWORD=${IGGY_PASSWORD}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - SYMBOLS_S3_BUCKET=${SYMBOLS_S3_BUCKET}
      - SYMBOLS_S3_BUCKET_REGION=${SYMBOLS_S3_BUCKET_REGION}
      - SYMBOLS_ACCESS_KEY=${SYMBOLS_ACCESS_KEY}
      - SYMBOLS_SECRET_ACCESS_KEY_FILE=/run/secrets/symbols-secret-access-key
      - SYMBOLICATOR_ORIGIN=${SYMBOLICATOR_ORIGIN}
      - ATTACHMENTS_S3_ORIGIN=${ATTACHMENTS_S3_ORIGIN:-}
      - ATTACHMENTS_S3_BUCKET=${ATTACHMENTS_S3_BUCKET}
      - ATTACHMENTS_S3_BUCKET_REGION=${ATTACHMENTS_S3_BUCKET_REGION}
      - ATTACHMENTS_ACCESS_KEY=${ATTACHMENTS_ACCESS_KEY}
      - ATTACHMENTS_SECRET_ACCESS_KEY_FILE=/run/secrets/attachments-secret-access-key
      - SITE_ORIGIN=${NEXT_PUBLIC_SITE_URL}
      - API_ORIGIN=${NEXT_PUBLIC_API_BASE_URL}
      - AGENT_ORIGIN=${NEXT_PUBLIC_AGENT_BASE_URL}
      - OAUTH_GOOGLE_KEY=${OAUTH_GOOGLE_KEY}
      - OAUTH_GOOGLE_SECRET_FILE=/run/secrets/oauth-google-secret
      - OAUTH_GITHUB_KEY=${OAUTH_GITHUB_KEY}
      - OAUTH_GITHUB_SECRET_FILE=/run/secrets/oauth-github-secret
      - SESSION_ACCESS_SECRET_FILE=/run/secrets/session-access-secret
      - SESSION_REFRESH_SECRET_FILE=/run/secrets/session-refresh-secret
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD_FILE=/run/secrets/smtp-password
      - EMAIL_DOMAIN=${EMAIL_DOMAIN}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID}
      - SLACK_CLIENT_SECRET_FILE=/run/secrets/slack-client-secret
      - SLACK_SIGNING_SECRET_FILE=/run/secrets/slack-signing-secret
      - SLACK_OAUTH_STATE_SECRET_FILE=/run/secrets/slack-oauth-state-secret
      - GA4_MEASUREMENT_ID=${GA4_MEASUREMENT_ID:-}
      - GA4_MEASUREMENT_PROTOCOL_SECRET_FILE=/run/secrets/ga4-measurement-protocol-secret
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_INSECURE_MODE=${OTEL_INSECURE_MODE}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - SYMBOLICATE_JVM_LAMBDA_REWRITE=true
      - PORT=8080
    develop:
      watch:
        - path: ../backend/api
          action: rebuild
        - path: ../backend/libs
          action: rebuild
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/ping"]
      interval: 5s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      iggy:
        condition: service_healthy
        required: false
      dbmate-postgres:
        condition: service_completed_successfully
        required: false
      dbmate-clickhouse:
        condition: service_completed_successfully
        required: false
      migrator:
        condition: service_completed_successfully
        required: false
      symbolicator:
        condition: service_healthy
      symboloader:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent:
    build:
      dockerfile: dockerfile
      context: ../backend/agent
