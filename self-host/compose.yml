      - AUTUMN_SECRET_KEY_FILE=/run/secrets/autumn-secret-key
      - POSTGRES_DSN_FILE=/run/secrets/postgres-dsn
      - CLICKHOUSE_DSN_FILE=/run/secrets/clickhouse-dsn
      - CLICKHOUSE_READER_DSN_FILE=/run/secrets/clickhouse-reader-dsn
      - CLICKHOUSE_AGENT_SQL_DSN_FILE=/run/secrets/clickhouse-agent-sql-dsn
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - IGGY_ADDR=${IGGY_ADDR}
      - IGGY_USERNAME=${IGGY_USERNAME}
      - IGGY_PASSWORD=${IGGY_PASSWORD}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - ATTACHMENTS_S3_ORIGIN=${ATTACHMENTS_S3_ORIGIN:-}
      - ATTACHMENTS_S3_BUCKET=${ATTACHMENTS_S3_BUCKET}
      - ATTACHMENTS_S3_BUCKET_REGION=${ATTACHMENTS_S3_BUCKET_REGION}
      - ATTACHMENTS_ACCESS_KEY=${ATTACHMENTS_ACCESS_KEY}
      - ATTACHMENTS_SECRET_ACCESS_KEY_FILE=/run/secrets/attachments-secret-access-key
      - SITE_ORIGIN=${NEXT_PUBLIC_SITE_URL}
      - AGENT_ORIGIN=${NEXT_PUBLIC_AGENT_BASE_URL}
      - OAUTH_GOOGLE_KEY=${OAUTH_GOOGLE_KEY}
      - OAUTH_GOOGLE_SECRET_FILE=/run/secrets/oauth-google-secret
      - OAUTH_GITHUB_KEY=${OAUTH_GITHUB_KEY}
      - OAUTH_GITHUB_SECRET_FILE=/run/secrets/oauth-github-secret
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_INSECURE_MODE=${OTEL_INSECURE_MODE}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - LLM_AGENT_KEY_FILE=/run/secrets/llm-agent-key
      - LLM_AGENT_MODEL_SMALL=${LLM_AGENT_MODEL_SMALL:-}
      - LLM_AGENT_MODEL_MEDIUM=${LLM_AGENT_MODEL_MEDIUM:-}
      - LLM_AGENT_MODEL_LARGE=${LLM_AGENT_MODEL_LARGE:-}
      - PORT=8084
    develop:
      watch:
        - path: ../backend/agent
          action: rebuild
        - path: ../backend/libs
          action: rebuild
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8084/ping"]
      interval: 5s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      iggy:
        condition: service_healthy
        required: false
      dbmate-postgres:
        condition: service_completed_successfully
        required: false
      dbmate-clickhouse:
        condition: service_completed_successfully
        required: false

  ingest-worker:
    build:
      dockerfile: dockerfile
      context: ../backend/ingest-worker
      additional_contexts:
        libs: ../backend/libs
      args:
        TARGETTYPE: debug
    ports:
      - "8086"
    deploy:
      replicas: 3
    secrets:
      - postgres-dsn
      - clickhouse-dsn
      - symbols-secret-access-key
      - attachments-secret-access-key
      - autumn-secret-key
      - ga4-measurement-protocol-secret
    environment:
      - POSTGRES_DSN_FILE=/run/secrets/postgres-dsn
      - CLICKHOUSE_DSN_FILE=/run/secrets/clickhouse-dsn
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - IGGY_ADDR=${IGGY_ADDR}
      - IGGY_USERNAME=${IGGY_USERNAME}
      - IGGY_PASSWORD=${IGGY_PASSWORD}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - SYMBOLS_S3_BUCKET=${SYMBOLS_S3_BUCKET}
      - SYMBOLS_S3_BUCKET_REGION=${SYMBOLS_S3_BUCKET_REGION}
      - SYMBOLS_ACCESS_KEY=${SYMBOLS_ACCESS_KEY}
      - SYMBOLS_SECRET_ACCESS_KEY_FILE=/run/secrets/symbols-secret-access-key
      - ATTACHMENTS_S3_BUCKET=${ATTACHMENTS_S3_BUCKET}
      - ATTACHMENTS_S3_BUCKET_REGION=${ATTACHMENTS_S3_BUCKET_REGION}
      - ATTACHMENTS_ACCESS_KEY=${ATTACHMENTS_ACCESS_KEY}
      - ATTACHMENTS_SECRET_ACCESS_KEY_FILE=/run/secrets/attachments-secret-access-key
      - SYSTEM_SYMBOLS_S3_BUCKET=${SYSTEM_SYMBOLS_S3_BUCKET}
      - SYMBOLICATOR_ORIGIN=${SYMBOLICATOR_ORIGIN}
      - SYMBOLOADER_ORIGIN=${SYMBOLOADER_ORIGIN}
      - API_ORIGIN=${NEXT_PUBLIC_API_BASE_URL}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_INSECURE_MODE=${OTEL_INSECURE_MODE}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - BILLING_ENABLED=${BILLING_ENABLED}
      - AUTUMN_SECRET_KEY_FILE=/run/secrets/autumn-secret-key
      - GA4_MEASUREMENT_ID=${GA4_MEASUREMENT_ID:-}
      - GA4_MEASUREMENT_PROTOCOL_SECRET_FILE=/run/secrets/ga4-measurement-protocol-secret
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-}
      - PORT=8086
    develop:
      watch:
        - path: ../backend/ingest-worker
          action: rebuild
        - path: ../backend/libs
          action: rebuild
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8086/ping"]
      interval: 5s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      iggy:
        condition: service_healthy
      dbmate-postgres:
        condition: service_completed_successfully
        required: false
      dbmate-clickhouse:
        condition: service_completed_successfully
        required: false
      migrator:
        condition: service_completed_successfully
        required: false
      symbolicator:
        condition: service_healthy
      symboloader:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingest:
    build:
      dockerfile: dockerfile
      context: ../backend/ingest
      additional_contexts:
        libs: ../backend/libs
      args:
        TARGETTYPE: debug
    ports:
      - "8085:8085"
    secrets:
      - postgres-dsn
      - clickhouse-dsn
      - symbols-secret-access-key
      - attachments-secret-access-key
      - autumn-secret-key
    environment:
      - BILLING_ENABLED=${BILLING_ENABLED}
      - AUTUMN_SECRET_KEY_FILE=/run/secrets/autumn-secret-key
      - POSTGRES_DSN_FILE=/run/secrets/postgres-dsn
      - CLICKHOUSE_DSN_FILE=/run/secrets/clickhouse-dsn
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - IGGY_ADDR=${IGGY_ADDR}
      - IGGY_USERNAME=${IGGY_USERNAME}
      - IGGY_PASSWORD=${IGGY_PASSWORD}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - SYMBOLS_S3_BUCKET=${SYMBOLS_S3_BUCKET}
      - SYMBOLS_S3_BUCKET_REGION=${SYMBOLS_S3_BUCKET_REGION}
      - SYMBOLS_ACCESS_KEY=${SYMBOLS_ACCESS_KEY}
      - SYMBOLS_SECRET_ACCESS_KEY_FILE=/run/secrets/symbols-secret-access-key
      - ATTACHMENTS_S3_BUCKET=${ATTACHMENTS_S3_BUCKET}
      - ATTACHMENTS_S3_BUCKET_REGION=${ATTACHMENTS_S3_BUCKET_REGION}
      - ATTACHMENTS_ACCESS_KEY=${ATTACHMENTS_ACCESS_KEY}
      - ATTACHMENTS_SECRET_ACCESS_KEY_FILE=/run/secrets/attachments-secret-access-key
      - API_ORIGIN=${NEXT_PUBLIC_API_BASE_URL}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_INSECURE_MODE=${OTEL_INSECURE_MODE}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - PORT=8085
    develop:
      watch:
        - path: ../backend/ingest
          action: rebuild
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8085/ping"]
      interval: 5s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      iggy:
        condition: service_healthy
      dbmate-postgres:
        condition: service_completed_successfully
        required: false
      dbmate-clickhouse:
        condition: service_completed_successfully
        required: false
      migrator:
        condition: service_completed_successfully
        required: false
      symbolicator:
        condition: service_healthy
      symboloader:
        condition: service_healthy
      redis:
        condition: service_healthy
      ingest-worker:
        condition: service_healthy

  cleanup:
    build:
      dockerfile: dockerfile
      context: ../backend/cleanup
      additional_contexts:
        libs: ../backend/libs
      args:
        TARGETTYPE: debug
    ports:
      - "8081:8081"
    secrets:
      - postgres-dsn
      - clickhouse-dsn
