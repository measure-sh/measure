      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - ATTACHMENTS_S3_ORIGIN=${ATTACHMENTS_S3_ORIGIN}
      - ATTACHMENTS_S3_BUCKET=${ATTACHMENTS_S3_BUCKET}
      - ATTACHMENTS_S3_BUCKET_REGION=${ATTACHMENTS_S3_BUCKET_REGION}
      - ATTACHMENTS_ACCESS_KEY=${ATTACHMENTS_ACCESS_KEY}
      - ATTACHMENTS_SECRET_ACCESS_KEY_FILE=/run/secrets/attachments-secret-access-key
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_INSECURE_MODE=${OTEL_INSECURE_MODE}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    develop:
      watch:
        - path: ../backend/cleanup
          action: rebuild
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/ping"]
      interval: 5s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      dbmate-postgres:
        condition: service_completed_successfully
        required: false
      dbmate-clickhouse:
        condition: service_completed_successfully
        required: false
      migrator:
        condition: service_completed_successfully
        required: false

  alerts:
    build:
      dockerfile: dockerfile
      context: ../backend/alerts
      additional_contexts:
        libs: ../backend/libs
      args:
        TARGETTYPE: debug
    ports:
      - "8082:8082"
    secrets:
      - postgres-dsn
      - clickhouse-dsn
      - smtp-password
      - autumn-secret-key
    environment:
      - POSTGRES_DSN_FILE=/run/secrets/postgres-dsn
      - CLICKHOUSE_DSN_FILE=/run/secrets/clickhouse-dsn
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - SITE_ORIGIN=${NEXT_PUBLIC_SITE_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD_FILE=/run/secrets/smtp-password
      - EMAIL_DOMAIN=${EMAIL_DOMAIN}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_INSECURE_MODE=${OTEL_INSECURE_MODE}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - BILLING_ENABLED=${BILLING_ENABLED}
      - AUTUMN_SECRET_KEY_FILE=/run/secrets/autumn-secret-key
    develop:
      watch:
        - path: ../backend/alerts
          action: rebuild
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8082/ping"]
      interval: 5s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      dbmate-postgres:
        condition: service_completed_successfully
        required: false
      dbmate-clickhouse:
        condition: service_completed_successfully
        required: false
      redis:
        condition: service_healthy

  symboloader:
    build:
      dockerfile: dockerfile
      context: ../backend/symboloader
      additional_contexts:
        libs: ../backend/libs
      args:
        TARGETTYPE: debug
    ports:
      - "8083:8083"
    secrets:
      - drive-api-key
      - postgres-dsn
      - symbols-secret-access-key
    environment:
      - POSTGRES_DSN_FILE=/run/secrets/postgres-dsn
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - SYSTEM_SYMBOLS_S3_BUCKET=${SYSTEM_SYMBOLS_S3_BUCKET}
      - SYMBOLS_S3_BUCKET=${SYMBOLS_S3_BUCKET}
      - SYMBOLS_S3_BUCKET_REGION=${SYMBOLS_S3_BUCKET_REGION}
      - SYMBOLS_ACCESS_KEY=${SYMBOLS_ACCESS_KEY}
      - SYMBOLS_SECRET_ACCESS_KEY_FILE=/run/secrets/symbols-secret-access-key
      - DRIVE_API_KEY_FILE=/run/secrets/drive-api-key
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_INSECURE_MODE=${OTEL_INSECURE_MODE}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    develop:
      watch:
        - path: ../backend/symboloader
          action: rebuild
        - path: ../backend/libs
          action: rebuild
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8083/ping"]
      interval: 5s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      dbmate-postgres:
        condition: service_completed_successfully
        required: false

  migrator:
    profiles:
      - migrate
    build:
      dockerfile: dockerfile
      context: ../backend/migrator
      additional_contexts:
        libs: ../backend/libs
      args:
        TARGETTYPE: debug
    secrets:
      - postgres-dsn
      - clickhouse-dsn
      - clickhouse-reader-dsn
      - symbols-secret-access-key
    environment:
      - POSTGRES_DSN_FILE=/run/secrets/postgres-dsn
      - CLICKHOUSE_DSN_FILE=/run/secrets/clickhouse-dsn
      - CLICKHOUSE_READER_DSN_FILE=/run/secrets/clickhouse-reader-dsn
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - SYMBOLS_S3_BUCKET=${SYMBOLS_S3_BUCKET}
      - SYMBOLS_S3_BUCKET_REGION=${SYMBOLS_S3_BUCKET_REGION}
      - SYMBOLS_ACCESS_KEY=${SYMBOLS_ACCESS_KEY}
      - SYMBOLS_SECRET_ACCESS_KEY_FILE=/run/secrets/symbols-secret-access-key
    develop:
      watch:
        - path: ../backend/migrator
          action: rebuild
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - migrator-volume:/data
    command: ["migrate"]

  symbolicator:
    image: ghcr.io/getsentry/symbolicator:26.3.1
    ports:
      - "3021:3021"
    volumes:
      - ./symbolicator/config.yml:/etc/symbolicator/config.yml:ro
    healthcheck:
      test: ["CMD", "symbolicator", "healthcheck"]
      interval: 3s
      timeout: 10s
      retries: 5
    command: ["run", "-c", "/etc/symbolicator/config.yml"]

  minio:
    image: pgsty/minio
    ports:
      - "9119:9000"
      - "9229:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_NOTIFY_WEBHOOK_ENABLE_SYMBOLS=on
      - MINIO_NOTIFY_WEBHOOK_ENDPOINT_SYMBOLS=${SYMBOLOADER_ORIGIN}/receive-symbols
    entrypoint: >
      bash -c "
      minio server /data --console-address ":9001" &

      until curl -sf http://127.0.0.1:9000/minio/health/live; do
        echo 'Waiting for MinIO server to start...';
        sleep 3;
      done;

      mc alias set msr-minio http://127.0.0.1:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};

      mc mb --ignore-existing msr-minio/${SYMBOLS_S3_BUCKET} msr-minio/${ATTACHMENTS_S3_BUCKET} msr-minio/${SYSTEM_SYMBOLS_S3_BUCKET};

      mc event add msr-minio/${SYMBOLS_S3_BUCKET} arn:minio:sqs::SYMBOLS:webhook --ignore-existing --event put --prefix incoming/;

      wait %1
      "
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9000/minio/health/live"]
      interval: 3s
      timeout: 10s
      retries: 5
    volumes:
      - minio-data:/data

  dbmate-postgres:
    image: ghcr.io/amacneil/dbmate
    profiles:
      - migrate
    environment:
      - DATABASE_URL=${POSTGRES_MIGRATION_URL}
      - DBMATE_MIGRATIONS_DIR=/opt/postgres
      - DBMATE_SCHEMA_FILE=/opt/postgres/schema.sql
      - DBMATE_WAIT=true
      - DBMATE_STRICT=true
      - DBMATE_NO_DUMP_SCHEMA=true
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    volumes:
      - ./postgres:/opt/postgres
    command: ["migrate"]

  dbmate-clickhouse:
    image: ghcr.io/amacneil/dbmate
    profiles:
      - migrate
    environment:
      - DATABASE_URL=${CLICKHOUSE_MIGRATION_URL}
      - DBMATE_MIGRATIONS_DIR=/opt/clickhouse
      - DBMATE_SCHEMA_FILE=/opt/clickhouse/schema.sql
      - DBMATE_WAIT=true
      - DBMATE_STRICT=true
      - DBMATE_NO_DUMP_SCHEMA=true
    depends_on:
      clickhouse:
        condition: service_healthy
        restart: true
    volumes:
      - ./clickhouse:/opt/clickhouse
    command: ["migrate"]

  iggy:
    image: apache/iggy
    restart: unless-stopped
    ports:
      - "3010:80"
      - "8090:8090"
    entrypoint: >
      bash -c "
      iggy-server &

      until iggy ping 2>/dev/null; do
        echo 'Waiting for Iggy server to start...';
        sleep 1;
      done;

      iggy -u ${IGGY_USERNAME} -p ${IGGY_PASSWORD} stream create measure || true;

      iggy -u ${IGGY_USERNAME} -p ${IGGY_PASSWORD} topic create measure ingest-batch 9 gzip 7d || true;

      iggy -u ${IGGY_USERNAME} -p ${IGGY_PASSWORD} consumer-group create measure ingest-batch ingest-batch-consumer || true;

      iggy -u ${IGGY_USERNAME} -p ${IGGY_PASSWORD} topic create measure agent-slack 1 gzip 7d || true;

      iggy -u ${IGGY_USERNAME} -p ${IGGY_PASSWORD} consumer-group create measure agent-slack agent-slack-consumer || true;

      wait %1
      "
    healthcheck:
      test: ["CMD-SHELL", "iggy ping"]
      interval: 3s
      timeout: 10s
      retries: 5
    environment:
      - IGGY_ROOT_USERNAME=${IGGY_USERNAME}
      - IGGY_ROOT_PASSWORD=${IGGY_PASSWORD}
      - IGGY_HTTP_ENABLED=true
      - IGGY_HTTP_ADDRESS=[::]:80
      - IGGY_TCP_ENABLED=true
      - IGGY_TCP_ADDRESS=[::]:8090
      - IGGY_QUIC_ENABLED=false
      - IGGY_WEBSOCKET_ENABLED=false
      - IGGY_HEARTBEAT_ENABLED=true
      - IGGY_HEARTBEAT_INTERVAL=5s
      - IGGY_SYSTEM_PATH=/local_data
    cap_add:
      - SYS_NICE
    security_opt:
      - seccomp=unconfined
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - iggy-data:/local_data

  postgres:
    image: postgres:16.3-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "log_statement=all"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 10s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh

  clickhouse:
    image: clickhouse/clickhouse-server:26.2-alpine
    environment:
      - CLICKHOUSE_DB=measure
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_ADMIN_USER=${CLICKHOUSE_ADMIN_USER}
      - CLICKHOUSE_ADMIN_PASSWORD=${CLICKHOUSE_ADMIN_PASSWORD}
      - CLICKHOUSE_OPERATOR_USER=${CLICKHOUSE_OPERATOR_USER}
      - CLICKHOUSE_OPERATOR_PASSWORD=${CLICKHOUSE_OPERATOR_PASSWORD}
      - CLICKHOUSE_READER_USER=${CLICKHOUSE_READER_USER}
      - CLICKHOUSE_READER_PASSWORD=${CLICKHOUSE_READER_PASSWORD}
      - CLICKHOUSE_AGENT_SQL_USER=${CLICKHOUSE_AGENT_SQL_USER}
      - CLICKHOUSE_AGENT_SQL_PASSWORD=${CLICKHOUSE_AGENT_SQL_PASSWORD}
    ports:
      - "9000:9000/tcp"
      - "8123:8123"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 3s
      timeout: 10s
      retries: 5
    ulimits:
      nofile: 262144
    volumes:
      - clickhouse-volume:/var/lib/clickhouse
      - clickhouse-volume:/var/log/clickhouse-server
      - ./clickhouse/init-clickhouse.sh:/docker-entrypoint-initdb.d/init-clickhouse.sh
      - type: bind
        source: ./clickhouse/config/config.xml
        target: /etc/clickhouse-server/config.d/config.xml

  redis:
    image: valkey/valkey:9.0.0-alpine
    ports:
      - "6379:6379"
    command: >
      valkey-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickstack:
    image: docker.hyperdx.io/hyperdx/hyperdx-local
    profiles:
      - debug
    ports:
      - 9090:8080
      - 4317:4317

  iggy-web:
    image: apache/iggy-web-ui
    profiles:
      - debug
    ports:
      - 3050:3050
    environment:
      - PUBLIC_IGGY_API_URL=http://localhost:3010

volumes:
  clickhouse-volume:
  migrator-volume:
  minio-data:
  iggy-data:
  pgdata:

secrets:
  drive-api-key:
    environment: "DRIVE_API_KEY"
  session-access-secret:
    environment: "SESSION_ACCESS_SECRET"
  session-refresh-secret:
    environment: "SESSION_REFRESH_SECRET"
  postgres-dsn:
    environment: "POSTGRES_DSN"
  clickhouse-dsn:
    environment: "CLICKHOUSE_DSN"
  clickhouse-reader-dsn:
    environment: "CLICKHOUSE_READER_DSN"
  clickhouse-agent-sql-dsn:
    environment: "CLICKHOUSE_AGENT_SQL_DSN"
  symbols-secret-access-key:
    environment: "SYMBOLS_SECRET_ACCESS_KEY"
  attachments-secret-access-key:
    environment: "ATTACHMENTS_SECRET_ACCESS_KEY"
  smtp-password:
    environment: "SMTP_PASSWORD"
  slack-client-secret:
    environment: "SLACK_CLIENT_SECRET"
  slack-signing-secret:
    environment: "SLACK_SIGNING_SECRET"
  slack-oauth-state-secret:
    environment: "SLACK_OAUTH_STATE_SECRET"
  ga4-measurement-protocol-secret:
    environment: "GA4_MEASUREMENT_PROTOCOL_SECRET"
  autumn-secret-key:
    environment: "AUTUMN_SECRET_KEY"
  autumn-webhook-secret:
    environment: "AUTUMN_WEBHOOK_SECRET"
  oauth-google-secret:
    environment: "OAUTH_GOOGLE_SECRET"
  oauth-github-secret:
    environment: "OAUTH_GITHUB_SECRET"
  llm-agent-key:
    environment: "LLM_AGENT_KEY"
  llm-docs-chat-key:
    environment: "LLM_DOCS_CHAT_KEY"
