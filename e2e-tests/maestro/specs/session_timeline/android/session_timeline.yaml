appId: ${APP_ID}
---
- launchApp
- extendedWaitUntil:
    visible: "Native Android"
    timeout: 10000
- tapOn: "Native Android"

- scrollUntilVisible:
    element:
      text: "Set User ID"
- tapOn: "Set User ID"

- scrollUntilVisible:
    direction: UP
    element:
      text: "Compose Navigation"
- tapOn: "Compose Navigation"
- tapOn: "Checkout"
- back
- back

- scrollUntilVisible:
    element:
      text: "HTTP Client"
- tapOn: "HTTP Client"
- tapOn: "GET"
- tapOn: "Random path"
- tapOn: "Send"
- back

- scrollUntilVisible:
    element:
      text: "HTTP Client"
- tapOn: "HTTP Client"
- setAirplaneMode: enabled
- tapOn: "Send"
- setAirplaneMode: disabled
- back

- scrollUntilVisible:
    element:
      text: "Create Span"
- tapOn: "Create Span"

- scrollUntilVisible:
    element:
      text: "Track Custom Event"
- tapOn: "Track Custom Event"

- scrollUntilVisible:
    element:
      text: "Track Handled Exception"
- tapOn: "Track Handled Exception"

- scrollUntilVisible:
    element:
      text: "Clear User ID"
- tapOn: "Clear User ID"

- pressKey: Home
- launchApp:
    stopApp: false
- extendedWaitUntil:
    visible: "Native Android"
    timeout: 5000
