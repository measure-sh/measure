openapi: "3.1.0"
info:
  title: Measure SDK API
  version: "1.0.0"
  description: |
    Reference for the Measure SDK ingestion REST API. Events, builds, config,
    attachments, traces and authentication.

    All endpoints authenticate with a Measure API key sent as a bearer token
    in the `Authorization` header:

    ```
    Authorization: Bearer <measure-api-key>
    ```

    Endpoints:

    - **PUT `/events`**: send a batch of events, spans, attachments, metrics and traces.
    - **PUT `/builds`**: send build mappings and build sizes.
    - **PUT `/builds/ota`**: send Over-The-Air patch mappings (CodePush, Shorebird) keyed by `patch_id`.
    - **GET `/config`**: fetch the latest SDK configuration for the app.
servers:
  - url: "https://{host}"
    description: >
      Measure ingestion server. Use the API URL configured for your app in the
      Measure dashboard; self-hosted deployments use their own origin.
    variables:
      host:
        default: your-measure-instance.example
        description: Hostname of the Measure deployment's ingestion endpoint.
  - url: http://localhost:8085
    description: Self-hosted Measure ingestion origin (local default)
security:
  - measureApiKey: []
tags:
  - name: Events
    description: Ingest batches of events, spans and attachments.
  - name: Builds
    description: Upload build sizes, build mappings and Over-The-Air patch mappings.
  - name: Config
    description: Fetch the SDK configuration for the app.
components:
  securitySchemes:
    measureApiKey:
      type: http
      scheme: bearer
      description: |
        Measure API key for the app, sent as `Authorization: Bearer <api-key>`.
        The app is determined from the API key.
paths:
  /events:
    put:
      operationId: putEvents
      tags:
        - Events
      summary: Ingest a batch of events and spans
      description: |
        Ingests a batch of events, which can be of different types and can range
        across multiple sessions.

        Usage notes:

        - Maximum size of one request must not exceed **10 MiB**. This limit includes
          the combination of events and blob data.
        - Each request must contain a unique UUIDv4 id, set as the header `msr-req-id`.
          If a request fails, the client must retry the same payload with the same
          `msr-req-id` to ensure idempotency.
        - Each event must contain a nanosecond precision `timestamp`, for example
          `"2023-08-24T14:51:38.000000534Z"`.
        - Each request must not contain duplicate event ids.
        - Each request must not contain duplicate span ids.
        - Each span must contain a nanosecond precision `start_time` and `end_time`.
        - Each event must have the following mandatory attributes:
          `attribute.installation_id`, `attribute.measure_sdk_version`,
          `attribute.thread_name`, `attribute.app_version`, `attribute.app_build`,
          `attribute.app_unique_id`.
        - Each span must have the following mandatory fields: `name`, `span_id`,
          `trace_id`, `session_id`, `status`, `start_time`, `end_time`,
          `attributes.installation_id`, `attributes.measure_sdk_version`,
          `attributes.app_version`, `attributes.os_version`, `attributes.app_unique_id`.
        - At least 1 event must be present in the `events` array field or 1 span must
          be present in the `spans` array field. Both arrays must not be empty.
        - The request body supports both `application/json` and `multipart/form-data`
          requests. Multipart requests will be deprecated in future versions; multipart
          only exists for backwards compatibility.
        - A successful JSON request returns `200 OK` with attachment upload URLs when
          the batch references attachments. A successful multipart request returns
          `202 Accepted`.
        - Idempotent based on `msr-req-id`. Previously seen requests matching by
          `msr-req-id` won't be re-processed; JSON requests receive the attachment
          upload info again so the client can proceed to upload attachments if any.

        A success response implies the server has accepted the request, but it may
        choose to not process and discard some events depending on various conditions.
      parameters:
        - name: msr-req-id
          in: header
          required: true
          description: >
            Unique UUIDv4 id for this request. If a request fails, retry the same
            payload with the same `msr-req-id` to ensure idempotency.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Batch of events and spans. At least one event or one span must be
                present.
              properties:
                events:
                  type: array
                  description: Events in the batch.
                  items:
                    type: object
                    description: >
                      A single event. Each event object must additionally contain one
                      payload field named after its `type`, for example an event with
                      `type` `gesture_click` carries a `gesture_click` object. Exactly
                      one such payload field must be present.
                    required:
                      - id
                      - type
                      - session_id
                      - timestamp
                      - attribute
                      - attachments
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: UUID of the event.
                      type:
                        type: string
                        description: >
                          Type of the event. Matches the name of the event payload
                          field present on the event. One of `anr`, `exception`,
                          `string`, `gesture_long_click`, `gesture_scroll`,
                          `gesture_click`, `http`, `network_change`, `app_exit`,
                          `lifecycle_activity`, `lifecycle_fragment`,
                          `lifecycle_view_controller`, `lifecycle_swift_ui`,
                          `lifecycle_app`, `cold_launch`, `warm_launch`, `hot_launch`,
                          `cpu_usage`, `memory_usage`, `memory_usage_absolute`,
                          `low_memory`, `trim_memory`, `navigation`, `screen_view`,
                          `custom`, `session_start`, `profile`.
                      session_id:
                        type: string
                        format: uuid
                        description: UUID of the session.
                      timestamp:
                        type: string
                        description: >
                          Nanosecond precision timestamp, for example
                          "2023-08-24T14:51:38.000000534Z".
                      user_triggered:
                        type: boolean
                        description: True when the event is triggered by the SDK consumer.
                      attribute:
                        type: object
                        description: Event attributes.
                        required:
                          - installation_id
                          - measure_sdk_version
                          - thread_name
                          - app_version
                          - app_build
                          - app_unique_id
                        properties:
                          installation_id:
                            type: string
                            description: >
                              A unique identifier for an installation of an app,
                              generated by the client.
                          app_version:
                            type: string
                            description: App version identifier.
                          app_build:
                            type: string
                            description: App build identifier.
                          app_unique_id:
                            type: string
                            description: App bundle identifier.
                          patch_id:
                            type: string
                            format: uuid
                            description: >
                              UUID of the Over-The-Air patch the app is running, if
                              any. See PUT /builds/ota.
                          patch_version:
                            type: string
                            description: >
                              Human-facing version of the Over-The-Air patch the app
                              is running, if any.
                          measure_sdk_version:
                            type: string
                            description: Measure SDK version identifier.
                          thread_name:
                            type: string
                            description: The thread on which the event was captured.
                          user_id:
                            type: ["string", "null"]
                            description: ID of the app's end user.
                          device_name:
                            type: string
                            description: Name of the device.
                          device_model:
                            type: string
                            description: Device model.
                          device_manufacturer:
                            type: string
                            description: Name of the device manufacturer.
                          device_type:
                            type: string
                            description: "`phone` or `tablet`."
                          device_is_foldable:
                            type: boolean
                            description: "`true` for foldable devices."
                          device_is_physical:
                            type: boolean
                            description: "`true` for physical devices."
                          device_density_dpi:
                            type: integer
                            description: DPI density.
                          device_width_px:
                            type: integer
                            description: Screen width.
                          device_height_px:
                            type: integer
                            description: Screen height.
                          device_density:
                            type: number
                            description: Device density.
                          device_locale:
                            type: string
                            description: Locale based on RFC 5646, for example en-US.
                          device_low_power_mode:
                            type: boolean
                            description: "`true` when low power mode is enabled."
                          device_thermal_throttling_enabled:
                            type: boolean
                            description: "`true` when thermal throttling is enabled."
                          os_name:
                            type: string
                            description: >
                              Operating system name. One of `android`, `ios`, `ipados`.
                          os_version:
                            type: string
                            description: Operating system version.
                          os_page_size:
                            type: integer
                            description: Operating system memory page size.
                          network_type:
                            type: string
                            description: >
                              One of `wifi`, `cellular`, `vpn`, `unknown`, `no_network`.
                          network_provider:
                            type: string
                            description: >
                              Example: airtel, T-mobile or "unknown" if unavailable.
                          network_generation:
                            type: string
                            description: One of `2g`, `3g`, `4g`, `5g`, `unknown`.
                          device_cpu_arch:
                            type: string
                            description: The CPU architecture, for example arm64.
                          session_start_time:
                            type: string
                            description: >
                              The ISO-8601 timestamp when the session containing this
                              event started.
                      user_defined_attribute:
                        type: ["object", "null"]
                        description: >
                          Optional attributes defined by the SDK user as key/value
                          pairs. An event may contain a maximum of 100 user defined
                          attributes. Key names must be unique, must not exceed 256
                          characters and must only contain alphabets, numbers,
                          underscores and hyphens. Values can be string, boolean or
                          number JSON types only. Integer values should be within the
                          int64 range, float values should not exceed the maximum
                          float64 value and string values should not exceed 256
                          characters.
                        maxProperties: 100
                        additionalProperties:
                          oneOf:
                            - type: string
                              maxLength: 256
                            - type: number
                            - type: boolean
                      attachments:
                        type: array
                        description: >
                          Attachments for the event. Must be an array of attachment
                          objects. Represent with an empty array if there are no
                          attachments.
                        items:
                          type: object
                          description: An arbitrary file associated with the session.
                          required:
                            - id
                            - name
                            - type
                          properties:
                            id:
                              type: string
                              format: uuid
                              description: Id of the attachment.
                            name:
                              type: string
                              description: Name of the attachment.
                            type:
                              type: string
                              description: Type of the attachment.
                              enum:
                                - screenshot
                                - android_method_trace
                                - layout_snapshot
                                - perfetto_trace
                                - heap_dump
                                - heap_profile
                      anr:
                        type: object
                        description: >
                          Use the `anr` type for Application Not Responding events.
                        required:
                          - exceptions
                          - foreground
                        properties:
                          handled:
                            type: boolean
                            deprecated: true
                            description: >
                              Do not use. Retained only for backwards compatibility.
                          exceptions:
                            type: array
                            description: Array of exception objects.
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                  description: >
                                    Type of the exception. Optional only for nested
                                    exceptions from Dart.
                                message:
                                  type: string
                                  description: >
                                    Error message text. Optional only for nested
                                    exceptions from Dart.
                                frames:
                                  type: array
                                  description: >
                                    Array of stackframe objects. Same shape as the
                                    frame objects of the `exception` event.
                                  items:
                                    type: object
                          foreground:
                            type: boolean
                            description: >
                              `true` if the app was in the foreground at the time of
                              the ANR.
                          threads:
                            type: array
                            description: Array of thread objects.
                            items:
                              type: object
                              properties:
                                name:
                                  type: string
                                  description: Name of thread.
                                frames:
                                  type: array
                                  description: Array of stackframe objects.
                                  items:
                                    type: object
                      exception:
                        type: object
                        description: >
                          Use the `exception` type for errors and crashes.
                        required:
                          - exceptions
                          - framework
                        properties:
                          handled:
                            type: boolean
                            deprecated: true
                            description: >
                              Do not use. Prefer using `severity` for new
                              integrations; `handled` is retained for backwards
                              compatibility.
                          severity:
                            type: string
                            enum:
                              - fatal
                              - handled
                              - unhandled
                            description: >
                              Severity level of the exception. When omitted, severity
                              is inferred from `handled`: `false` maps to `fatal`,
                              `true` maps to `handled`.
                          exceptions:
                            type: array
                            description: >
                              Array of exception objects. Each exception object
                              contains the thread information of the crashed thread
                              and its stackframes along with the metadata required for
                              symbolication.
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                  description: Type of the exception.
                                message:
                                  type: string
                                  description: Error message text.
                                frames:
                                  type: array
                                  description: Array of stackframe objects.
                                  items:
                                    type: object
                                    required:
                                      - in_app
                                    properties:
                                      line_num:
                                        type: number
                                        description: Line number of the method.
                                      col_num:
                                        type: number
                                        description: Column number of the method.
                                      module_name:
                                        type: string
                                        description: Name of the originating module.
                                      file_name:
                                        type: string
                                        description: Name of the originating file.
                                      class_name:
                                        type: string
                                        description: Name of the originating class.
                                      method_name:
                                        type: string
                                        description: Name of the originating method.
                                      binary_name:
                                        type: string
                                        description: >
                                          Name of the iOS binary image, for example
                                          `UIKitCore`. Used for selecting the binary
                                          image to use for symbolication.
                                      symbol_address:
                                        type: string
                                        description: >
                                          Address of the symbol to symbolicate. This
                                          is a hexadecimal number prefixed with `0x`.
                                          Use along with `offset` and `binary_address`
                                          for symbolication.
                                      offset:
                                        type: number
                                        description: >
                                          The byte offset, used along with
                                          `symbol_address` and `binary_address` for
                                          symbolication.
                                      binary_address:
                                        type: string
                                        description: >
                                          The binary load address, used along with
                                          `symbol_address` and `offset` for
                                          symbolication.
                                      in_app:
                                        type: boolean
                                        description: >
                                          `true` if the frame originates from the app
                                          module.
                                      frame_index:
                                        type: number
                                        description: >
                                          The index of the frame in the stack trace.
                                      instruction_address:
                                        type: string
                                        description: >
                                          The address of the instruction to
                                          symbolicate. This is a hexadecimal number
                                          prefixed with `0x`. Used for symbolication
                                          of Dart/ELF format crashes.
                                signal:
                                  type: string
                                  description: BSD termination signal.
                                thread_name:
                                  type: string
                                  description: Name of thread.
                                thread_sequence:
                                  type: number
                                  description: >
                                    The thread number used for ordering threads in a
                                    stacktrace. Used by Apple OSes.
                                os_build_number:
                                  type: string
                                  description: >
                                    OS build number used to select system binary image
                                    for Apple OSes. For example, `22D72` is the build
                                    number for iPhone OS 18.3.1.
                          foreground:
                            type: boolean
                            description: >
                              `true` if the app was in the foreground at the time of
                              the exception.
                          threads:
                            type: array
                            description: >
                              Array of thread objects. Only non-crashed threads are to
                              be sent in thread objects.
                            items:
                              type: object
                              properties:
                                name:
                                  type: string
                                  description: Name of thread.
                                frames:
                                  type: array
                                  description: >
                                    Array of stackframe objects. Same shape as the
                                    frame objects under `exceptions`.
                                  items:
                                    type: object
                                sequence:
                                  type: number
                                  description: >
                                    The frame index used for ordering frames in a
                                    stacktrace. Used by Apple OSes.
                          binary_images:
                            type: array
                            description: >
                              An optional array of all the binary images needed for
                              symbolication.
                            items:
                              type: object
                              required:
                                - arch
                                - uuid
                              properties:
                                start_addr:
                                  type: string
                                  description: >
                                    Start address, where the binary is loaded into
                                    virtual memory. Only applies to Apple apps.
                                end_addr:
                                  type: string
                                  description: >
                                    End address, the upper memory boundary of the
                                    binary. Only applies to Apple apps.
                                base_addr:
                                  type: string
                                  description: >
                                    Base address of symbols, only applies to Dart
                                    exceptions.
                                system:
                                  type: boolean
                                  description: >
                                    Binary marker indicating a system binary, only
                                    applies to Apple apps.
                                name:
                                  type: string
                                  description: >
                                    Name of the app, framework or library binary, only
                                    applies to Apple apps.
                                arch:
                                  type: string
                                  description: CPU architecture the binary is compiled for.
                                uuid:
                                  type: string
                                  description: Unique fingerprint for the binary's build.
                                path:
                                  type: string
                                  description: >
                                    Full path to where the binary was located at
                                    runtime, only applies to Apple apps.
                          framework:
                            type: string
                            enum:
                              - dart
                              - jvm
                              - apple
                              - js
                            description: >
                              Specifies the framework where the exception originated
                              from.
                          is_custom:
                            type: boolean
                            description: >
                              `true` for user-tracked errors (for example
                              `payment_failed`). Defaults to `false`.
                          error:
                            type: object
                            deprecated: true
                            description: >
                              Deprecated. Use `num_code`, `code`, and `meta` directly
                              on the exception instead. An optional object for
                              tracking error(s). Applicable to Apple apps. Should not
                              exceed 4096 bytes.
                            properties:
                              numcode:
                                type: integer
                                description: Numeric code that describes the error.
                              code:
                                type: string
                                description: String code that describes the error.
                              meta:
                                type: object
                                description: >
                                  Object containing arbitrary fields for the error's
                                  metadata.
                          num_code:
                            type: integer
                            description: Numeric code that describes the exception.
                          code:
                            type: string
                            description: String code that describes the exception.
                          meta:
                            type: object
                            description: >
                              Object containing arbitrary fields for the exception's
                              metadata. Should not exceed 4096 bytes.
                      "string":
                        type: object
                        description: >
                          Use the `string` type when sending unstructured or
                          structured logs. Make sure structured logs are in
                          stringified JSON format.
                        required:
                          - string
                        properties:
                          severity_text:
                            type: string
                            description: >
                              Log level. One of `info`, `warning`, `error`, `fatal`,
                              `debug`.
                          "string":
                            type: string
                            description: Log message text.
                      gesture_long_click:
                        type: object
                        description: >
                          Use the `gesture_long_click` body type for longer press and
                          hold gestures.
                        required:
                          - x
                          - y
                        properties:
                          target:
                            type: string
                            description: Class/Instance name of the originating view.
                          target_id:
                            type: string
                            description: Unique identifier for the target.
                          label:
                            type: string
                            description: >
                              Visible text of the clicked element, truncated to 32
                              chars.
                          semantic_label:
                            type: string
                            description: >
                              Accessibility label of the clicked element, truncated to
                              32 chars.
                          touch_down_time:
                            type: integer
                            description: System uptime when target was pressed.
                          touch_up_time:
                            type: integer
                            description: System uptime when target was released.
                          width:
                            type: integer
                            description: Width of the target view in pixels.
                          height:
                            type: integer
                            description: Height of the target view in pixels.
                          x:
                            type: number
                            description: X coordinate of the target view.
                          y:
                            type: number
                            description: Y coordinate of the target view.
                      gesture_scroll:
                        type: object
                        description: Use the `gesture_scroll` body type for scroll events.
                        required:
                          - x
                          - y
                          - end_x
                          - end_y
                        properties:
                          target:
                            type: string
                            description: Class/Instance name of the originating view.
                          target_id:
                            type: string
                            description: Unique identifier for the target.
                          touch_down_time:
                            type: integer
                            description: System uptime when target scroll started.
                          touch_up_time:
                            type: integer
                            description: System uptime when target scroll ended.
                          x:
                            type: number
                            description: X coordinate of the target where scroll started.
                          y:
                            type: number
                            description: Y coordinate of the target where scroll started.
                          end_x:
                            type: number
                            description: X coordinate of the target where scroll ended.
                          end_y:
                            type: number
                            description: Y coordinate of the target where scroll ended.
                          direction:
                            type: string
                            description: >
                              The direction of the scroll. One of left, right, up,
                              down.
                      gesture_click:
                        type: object
                        description: Use the `gesture_click` body type for taps or clicks.
                        required:
                          - x
                          - y
                        properties:
                          target:
                            type: string
                            description: Class/Instance name of the originating view.
                          target_id:
                            type: string
                            description: Unique identifier for the target.
                          label:
                            type: string
                            description: >
                              Visible text of the clicked element, truncated to 32
                              chars.
                          semantic_label:
                            type: string
                            description: >
                              Accessibility label of the clicked element, truncated to
                              32 chars.
                          touch_down_time:
                            type: integer
                            description: System uptime when target was pressed.
                          touch_up_time:
                            type: integer
                            description: System uptime when target was released.
                          width:
                            type: integer
                            description: Width of the target view in pixels.
                          height:
                            type: integer
                            description: Height of the target view in pixels.
                          x:
                            type: number
                            description: X coordinate of the target where click happened.
                          y:
                            type: number
                            description: Y coordinate of the target where click happened.
                      http:
                        type: object
                        description: >
                          Use the `http` body type for tracking a single HTTP network
                          call.
                        required:
                          - url
                          - method
                        properties:
                          url:
                            type: string
                            description: Complete URL of the HTTP request.
                          method:
                            type: string
                            description: >
                              Any of the common HTTP methods like `GET` or `POST`.
                          status_code:
                            type: integer
                            description: Any of the common HTTP response codes.
                          start_time:
                            type: integer
                            description: The uptime at which the http call started, in ms.
                          end_time:
                            type: integer
                            description: The uptime at which the http call ended, in ms.
                          failure_reason:
                            type: string
                            description: >
                              The reason for failure. For Android, typically the
                              IOException class name.
                          failure_description:
                            type: string
                            description: >
                              The description of the failure. For Android, typically
                              the IOException message.
                          request_headers:
                            type: object
                            description: The request headers.
                            additionalProperties:
                              type: string
                          response_headers:
                            type: object
                            description: The response headers.
                            additionalProperties:
                              type: string
                          request_body:
                            type: string
                            description: >
                              The request body, if any. Only supported for json body.
                          response_body:
                            type: string
                            description: >
                              The response body, if any. Only supported for json body.
                          client:
                            type: string
                            description: Name of the http client like `Okhttp`.
                      network_change:
                        type: object
                        description: >
                          Use the `network_change` type for tracking changes to the
                          network state of the device.
                        required:
                          - network_type
                          - network_provider
                          - network_generation
                          - previous_network_type
                          - previous_network_generation
                        properties:
                          network_type:
                            type: string
                            description: >
                              One of `wifi`, `cellular`, `vpn`, `unknown`, `no_network`.
                          network_provider:
                            type: string
                            description: >
                              Example: airtel, T-mobile or "unknown" if unavailable.
                          network_generation:
                            type: string
                            description: One of `2g`, `3g`, `4g`, `5g`, `unknown`.
                          previous_network_type:
                            type: string
                            description: >
                              One of `wifi`, `cellular`, `vpn`, `unknown`, `no_network`.
                          previous_network_generation:
                            type: string
                            description: One of `2g`, `3g`, `4g`, `5g`, `unknown`.
                      app_exit:
                        type: object
                        description: Use the `app_exit` type for Application Exit events.
                        required:
                          - reason
                          - importance
                          - process_name
                        properties:
                          reason:
                            type: string
                            description: Reason for the app exit.
                            enum:
                              - REASON_ANR
