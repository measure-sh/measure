                spans:
                  type: array
                  description: Spans in the batch.
                  items:
                    type: object
                    description: >
                      A span is the fundamental building block of a trace.
                    required:
                      - name
                      - trace_id
                      - span_id
                      - session_id
                      - status
                      - start_time
                      - end_time
                      - duration
                      - attributes
                    properties:
                      trace_id:
                        type: string
                        description: >
                          16 bytes (128-bit) represented as 32 lowercase hex
                          characters. Identifies a group of spans for an operation.
                      span_id:
                        type: string
                        description: >
                          8 bytes (64-bit) represented as 16 lowercase hex characters.
                          Unique identifier for a span in a trace.
                      parent_id:
                        type: ["string", "null"]
                        description: >
                          Parent `span_id`, used to set a parent-child relationship
                          between spans.
                      session_id:
                        type: string
                        format: uuid
                        description: UUID of the session.
                      name:
                        type: string
                        description: >
                          The name of the span. Used to identify spans on the
                          dashboard.
                      status:
                        type: integer
                        enum: [0, 1, 2]
                        description: >
                          Signifies operation success or failure. One of ok (0), error
                          (1), unset (2).
                      start_time:
                        type: string
                        description: >
                          Nanosecond precision timestamp, for example
                          "2023-08-24T14:51:38.000000534Z".
                      end_time:
                        type: string
                        description: >
                          Nanosecond precision timestamp, for example
                          "2023-08-24T14:51:38.000000834Z".
                      duration:
                        type: integer
                        description: >
                          Duration of the span in milliseconds, calculated using a
                          monotonic clock.
                      checkpoints:
                        type: array
                        description: >
                          Named time markers within a span. Example: lifecycle events
                          like `on_create`, `on_resume`.
                        items:
                          type: object
                          required:
                            - name
                            - timestamp
                          properties:
                            name:
                              type: string
                              description: Name of the checkpoint.
                            timestamp:
                              type: string
                              description: Timestamp of the checkpoint.
                      attributes:
                        type: object
                        description: >
                          Key-value pairs adding context to the span. Some attributes
                          are automatically added while custom attributes can be set
                          by clients. Spans contain the same set of attributes as
                          events; see the event `attribute` object. The following keys
                          are mandatory: `installation_id`, `measure_sdk_version`,
                          `app_version`, `os_version`, `app_unique_id`.
