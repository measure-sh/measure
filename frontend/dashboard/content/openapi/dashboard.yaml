openapi: 3.1.0
info:
  title: Measure Dashboard API
  version: 1.0.0
  description: |
    Reference for Measure's Dashboard REST API. Every endpoint, request body,
    response format and status code.

    Requests are authenticated with the user's access token in
    `Authorization: Bearer <access-token>` format, unless cookies are used to
    send tokens. Set `Content-Type: application/json; charset=utf-8` on each
    request.

    Failed requests have the following response shape:

    ```json
    {
      "error": "Error message"
    }
    ```
servers:
  - url: https://api.measure.sh
    description: Measure cloud
  - url: http://localhost:8080
    description: Self-hosted Measure API origin
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Sign in, session validation, token refresh and sign out.
  - name: Apps
    description: App journey, metrics, filters, settings, builds and configuration.
  - name: Crashes
    description: Crash groups, crash details and crash plots.
  - name: ANRs
    description: ANR groups, ANR details and ANR plots.
  - name: Errors
    description: Error groups, error details and error plots.
  - name: Sessions
    description: Session listing, session plots and session timelines.
  - name: Traces
    description: Root spans, span listings and traces.
  - name: Bug Reports
    description: Bug report listing, details and status updates.
  - name: Alerts
    description: Alerts raised for an app.
  - name: Network Requests
    description: Network request domains, paths, trends and plots.
  - name: Teams
    description: Team management, apps, members, invites, usage and Slack integration.
  - name: Prefs
    description: User notification preferences.
paths:
  /auth/github:
    post:
      operationId: signinGithub
      tags:
        - Auth
      summary: Sign in with GitHub
      description: |
        Sign in with Github.

        Should pass in type as "code" along with state and code received from Github.
      security: []
      parameters:
        - name: ga_client_id
          in: query
          required: false
          description: Optional Google Analytics client identifier forwarded during sign-in.
          schema:
            type: string
        - name: gclid
          in: query
          required: false
          description: Optional Google Ads click identifier forwarded during sign-in.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - state
              properties:
                type:
                  type: string
                  description: OAuth flow step, "init" or "code".
                state:
                  type: string
                  description: Opaque OAuth state value.
                code:
                  type: string
                  description: Authorization code received from GitHub. Required when type is "code".
            examples:
              request:
                value:
                  type: code
                  state: eyJyYW5kb20iOiIxOGY0NDIzZjExY2FiM2ZkOTRiNDZlMzU0ZWU1MDNlZjEyODk1MmY3YzViMDgxNjczMDkwMzVhYzU3ZjNkYjgxIiwicGF0aCI6IiJ9
                  code: ccd85e1fbfae2924588a
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  session_id:
                    type: string
                  user_id:
                    type: string
                  own_team_id:
                    type: string
              examples:
                response:
                  value:
                    access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NDUyMjU0ODR9.UA-rtIY8TPjB3gkt0xgxTTXWa84uB6nr9vMyg0gMnSI
                    refresh_token: yJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NDU4Mjg0ODR9.1-meGfGQ8i9IlNxKXmBlDc4lEu-O63jG2vrd7yP0-j8
                    session_id: afae8473-2419-4303-a262-2aea520de295
                    user_id: 835283a5-cddc-472b-84ad-5ea3319efeed
                    own_team_id: e47ac49d-0697-4e85-8607-1a34536c04e3
        "400":
          description: Request URI is malformed or does not meet one or more acceptance criteria. Check the `error` field for more details.
        "429":
          description: Rate limit of the requester has crossed maximum limits.
        "500":
          description: Measure server encountered an unfortunate error. Report this to your server administrator.
  /auth/google:
    post:
      operationId: signinGoogle
      tags:
        - Auth
      summary: Sign in with Google
      description: |
        Sign in with Google.

        Should pass in type as "code" along with state and code received from Google.
      security: []
      parameters:
        - name: ga_client_id
          in: query
          required: false
          description: Optional Google Analytics client identifier forwarded during sign-in.
          schema:
            type: string
        - name: gclid
          in: query
          required: false
          description: Optional Google Ads click identifier forwarded during sign-in.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - state
              properties:
                type:
                  type: string
                  description: OAuth flow step, "init" or "code".
                state:
                  type: string
                  description: Opaque OAuth state value.
                code:
                  type: string
                  description: Authorization code received from Google. Required when type is "code".
            examples:
              request:
                value:
                  type: code
                  state: eyJyYW5kb20iOiJiMGNkMTBjNzViOTI3NjQ1MmM4NTRlMzJiMjlkOTI1ZmI0YjkyNGI5ODFkZDQ0ZjM4OTMwYWQwYzU2YjEzMDk3IiwicGF0aCI6IiJ9
                  code: 4/0AeaYSHBg8Yt2VXpDbb1kMqzy
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  session_id:
                    type: string
                  user_id:
                    type: string
                  own_team_id:
                    type: string
              examples:
                response:
                  value:
                    access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NDUyMjU2NTl9.XzbpImWw9GXFlIXHCu92QNsA1D8m_Y9ZFVDEDqG_wtM
                    refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NDU4Mjg2NTl9.MeMIsk1KEHvPa2AAbDBQWqeKJwQcxbk1lXb7Mhcz-uQ
                    session_id: afae8473-2419-4303-a262-2aea520de295
                    user_id: 835283a5-cddc-472b-84ad-5ea3319efeed
                    own_team_id: e47ac49d-0697-4e85-8607-1a34536c04e3
        "400":
          description: Request URI is malformed or does not meet one or more acceptance criteria. Check the `error` field for more details.
        "429":
          description: Rate limit of the requester has crossed maximum limits.
        "500":
          description: Measure server encountered an unfortunate error. Report this to your server administrator.
  /auth/validateInvite:
    post:
      operationId: validateInvite
      tags:
        - Auth
      summary: Validate invite
      description: |
        Validate invite.

        Should pass in Invite ID.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invite_id:
                  type: string
            examples:
              request:
                value:
                  invite_id: 8e07edcf-92be-43c6-934e-c9cc96f2ddfb
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
              examples:
                response:
                  value:
                    valid: true
        "400":
          description: Request URI is malformed or does not meet one or more acceptance criteria. Check the `error` field for more details.
        "410":
          description: Invite has expired.
        "429":
          description: Rate limit of the requester has crossed maximum limits.
        "500":
          description: Measure server encountered an unfortunate error. Report this to your server administrator.
  /auth/refresh:
    post:
      operationId: refreshToken
      tags:
        - Auth
      summary: Refresh session
      description: |
        Refresh session.

        Should pass in refresh token as cookies or in auth header. Set the
        session's refresh token in `Authorization: Bearer <refresh-token>`
        format unless you are using cookies to send refresh tokens.
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
              examples:
                response:
                  value:
                    access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NDUyMjU2NTl9.XzbpImWw9GXFlIXHCu92QNsA1D8m_Y9ZFVDEDqG_wtM
                    refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NDU4Mjg2NTl9.MeMIsk1KEHvPa2AAbDBQWqeKJwQcxbk1lXb7Mhcz-uQ
        "400":
          description: Request URI is malformed or does not meet one or more acceptance criteria. Check the `error` field for more details.
        "401":
          description: Either the user's refresh token is invalid or has expired.
        "403":
          description: Requester does not have access to this resource.
        "429":
          description: Rate limit of the requester has crossed maximum limits.
        "500":
          description: Measure server encountered an unfortunate error. Report this to your server administrator.
  /auth/session:
    get:
      operationId: getAuthSession
      tags:
        - Auth
      summary: Fetch session
      description: |
        Fetch session.

        Only active sessions that have not been cleaned up will receive a
        response. Invalid sessions return an error.
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      own_team_id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      confirmed_at:
                        type: string
                      last_sign_in_at:
                        type: string
                      created_at:
                        type: string
                      updated_at:
                        type: string
              examples:
                response:
                  value:
                    user:
                      id: 835283a5-cddc-472b-84ad-5ea3319efeed
                      own_team_id: e47ac49d-0697-4e85-8607-1a34536c04e3
                      name: Dummy User
                      email: dummy@gmail.com
                      confirmed_at: "2024-06-19T22:14:49.77Z"
                      last_sign_in_at: "2024-06-19T22:14:49.77Z"
                      created_at: "2024-06-19T22:14:49.77Z"
                      updated_at: "2024-06-19T22:14:49.77Z"
        "400":
          description: Request URI is malformed or does not meet one or more acceptance criteria. Check the `error` field for more details.
        "401":
          description: Either the user's access token is invalid or has expired.
        "403":
          description: Requester does not have access to this resource.
        "429":
          description: Rate limit of the requester has crossed maximum limits.
        "500":
          description: Measure server encountered an unfortunate error. Report this to your server administrator.
  /auth/signout:
    delete:
      operationId: signout
      tags:
        - Auth
      summary: Sign out
      description: |
        Sign out.

        Only active sessions that have not been cleaned up will receive a
        response. Invalid sessions return an error. Set the session's refresh
        token in `Authorization: Bearer <refresh-token>` format unless you are
        using cookies to send refresh tokens.
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              examples:
                response:
                  value:
                    ok: true
        "400":
          description: Request URI is malformed or does not meet one or more acceptance criteria. Check the `error` field for more details.
        "401":
          description: Either the user's refresh token is invalid or has expired.
        "403":
          description: Requester does not have access to this resource.
        "429":
          description: Rate limit of the requester has crossed maximum limits.
        "500":
          description: Measure server encountered an unfortunate error. Report this to your server administrator.
  /apps/{id}/journey:
    get:
      operationId: getAppJourney
      tags:
        - Apps
      summary: Fetch an app's issue journey map
      description: |
        Fetch an app's issue journey map. Filter time range using `from` & `to`
        query string parameters. Filter versions using `versions` &
        `version_codes` query string parameters.
      parameters:
        - name: id
          in: path
          required: true
          description: App's UUID.
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          description: ISO8601 timestamp to include crashes after this time.
          schema:
            type: string
        - name: to
          in: query
          required: false
          description: ISO8601 timestamp to include crashes before this time.
          schema:
            type: string
        - name: versions
          in: query
          required: false
          description: List of comma separated version identifier strings to return only matching crashes.
          schema:
            type: string
        - name: version_codes
          in: query
          required: false
          description: List of comma separated version codes to return only matching crashes.
          schema:
            type: string
        - name: bigraph
          in: query
          required: false
          description: Choose journey's directionality. `0` computes a unidirectional graph. Default is `1`.
          schema:
            type: string
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: array
                    items:
                      type: object
                      properties:
                        source:
                          type: string
                        target:
                          type: string
                        value:
                          type: number
                  nodes:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        issues:
                          type: object
                          properties:
                            anrs:
                              type: array
                              items:
                                type: object
                                additionalProperties: true
                            crashes:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  title:
                                    type: string
                                  count:
                                    type: number
                  totalIssues:
                    type: number
              examples:
                response:
                  value:
                    links:
                      - source: au.com.shiftyjelly.pocketcasts.ui.MainActivity
                        target: au.com.shiftyjelly.pocketcasts.player.view.PlayerContainerFragment
                        value: 4
                      - source: au.com.shiftyjelly.pocketcasts.account.onboarding.OnboardingActivity
                        target: au.com.shiftyjelly.pocketcasts.ui.MainActivity
                        value: 1
                    nodes:
                      - id: au.com.shiftyjelly.pocketcasts.ui.MainActivity
                        issues:
                          anrs: []
                          crashes: []
                      - id: au.com.shiftyjelly.pocketcasts.discover.view.DiscoverFragment
                        issues:
                          anrs: []
                          crashes:
                            - id: 018f5c68-6fe0-75c9-81ba-b36871c8b5fa
                              title: java.lang.IllegalStateException
                              count: 18
                    totalIssues: 30
        "400":
          description: Request URI is malformed or does not meet one or more acceptance criteria. Check the `error` field for more details.
        "401":
          description: Either the user's access token is invalid or has expired.
        "403":
          description: Requester does not have access to this resource.
        "429":
          description: Rate limit of the requester has crossed maximum limits.
        "500":
          description: Measure server encountered an unfortunate error. Report this to your server administrator.
  /apps/{id}/metrics:
    get:
      operationId: getAppMetrics
      tags:
        - Apps
      summary: Fetch an app's health metrics
      description: |
        Fetch an app's health metrics. Filter time range using `from` & `to`
        query string parameters. Filter version using `versions` &
        `version_codes` query string parameters.

        Both `versions` & `version_codes` should be present if any one of them
        is present, and the number of items in each must be the same. `from` &
        `to` values must be ISO 8601 UTC strings in milliseconds precision and
        default to a last 7 days time range if not supplied. Only the first
        version in `versions` & `version_codes` is used to query at the moment.

        `nan` can be true in the response if some computed values result in a
        division by zero error.
      parameters:
        - name: id
          in: path
          required: true
          description: App's UUID.
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          description: "ISO 8601 UTC string in milliseconds precision. Example: `2023-11-01T18:30:00.000Z`."
          schema:
            type: string
        - name: to
          in: query
          required: false
          description: "ISO 8601 UTC string in milliseconds precision. Example: `2023-11-08T18:30:00.000Z`."
          schema:
            type: string
        - name: versions
          in: query
          required: false
          description: Comma separated version identifiers. Only the first version will be used to query at the moment.
          schema:
            type: string
        - name: version_codes
          in: query
          required: false
          description: Comma separated version codes. Only the first version will be used to query at the moment.
          schema:
            type: string
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  adoption:
                    type: object
                    properties:
                      all_versions:
                        type: number
                      selected_version:
                        type: number
                      adoption:
                        type: number
                      nan:
                        type: boolean
                  anr_free_sessions:
                    type: object
                    properties:
                      anr_free_sessions:
                        type: number
                      delta:
                        type: number
                      nan:
                        type: boolean
                  cold_launch:
                    type: object
                    properties:
                      delta:
                        type: number
                      nan:
                        type: boolean
                      p95:
                        type: number
                  crash_free_sessions:
                    type: object
                    properties:
                      crash_free_sessions:
                        type: number
                      delta:
                        type: number
                      nan:
                        type: boolean
                  hot_launch:
                    type: object
                    properties:
                      delta:
                        type: number
                      nan:
                        type: boolean
                      p95:
                        type: number
                  perceived_anr_free_sessions:
                    type: object
                    properties:
                      perceived_anr_free_sessions:
                        type: number
                      delta:
                        type: number
                      nan:
                        type: boolean
                  perceived_crash_free_sessions:
                    type: object
                    properties:
                      perceived_crash_free_sessions:
                        type: number
                      delta:
                        type: number
                      nan:
                        type: boolean
                  sizes:
                    type: object
                    properties:
                      average_app_size:
                        type: number
                      selected_app_size:
                        type: number
                      delta:
                        type: number
                      nan:
                        type: boolean
                  warm_launch:
                    type: object
                    properties:
                      delta:
                        type: number
                      nan:
                        type: boolean
                      p95:
                        type: number
              examples:
                response:
                  value:
                    adoption:
                      all_versions: 53
                      selected_version: 23
                      adoption: 43.4
                      nan: false
                    anr_free_sessions:
                      anr_free_sessions: 100
                      delta: 1
                      nan: false
                    cold_launch:
                      delta: 0
                      nan: true
                      p95: 0
                    crash_free_sessions:
                      crash_free_sessions: 0
                      delta: 1
                      nan: false
                    hot_launch:
                      delta: 0
                      nan: true
                      p95: 0
                    perceived_anr_free_sessions:
                      perceived_anr_free_sessions: 100
                      delta: 1
                      nan: false
                    perceived_crash_free_sessions:
                      perceived_crash_free_sessions: 0
                      delta: 1
                      nan: false
                    sizes:
                      average_app_size: 26298701
                      selected_app_size: 25887094
                      delta: -411607
                      nan: false
                    warm_launch:
                      delta: 0
                      nan: true
                      p95: 0
        "400":
          description: Request URI is malformed or does not meet one or more acceptance criteria. Check the `error` field for more details.
        "401":
          description: Either the user's access token is invalid or has expired.
        "403":
          description: Requester does not have access to this resource.
        "429":
          description: Rate limit of the requester has crossed maximum limits.
        "500":
          description: Measure server encountered an unfortunate error. Report this to your server administrator.
  /apps/{id}/health/plots/instances:
    get:
      operationId: getHealthOverviewPlotInstances
      tags:
        - Apps
      summary: Fetch an app's health overview instances plot
      description: |
        Fetch an app's health overview instances plot. The response is a time
        series of three metrics bucketed by datetime: sessions, crashes (fatal
        exceptions) & ANRs. Filter time range using `from` & `to` query string
        parameters. Filter version using `versions` & `version_codes` query
        string parameters.

        `from` & `to` will default to a last 7 days time range if not supplied.
        Both `versions` & `version_codes` should be present if any one of them
        is present, and must contain the same number of items. For multiple
        comma separated fields, make sure no whitespace characters exist before
        or after commas.

        The response is an array of three series identified by `id`:
        `sessions`, `crashes` & `anrs`. Each series holds a sparse list of
        datetime buckets that had data, so a bucket with no crashes or ANRs is
        simply absent from that series.
      parameters:
        - name: id
          in: path
          required: true
          description: App's UUID.
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          description: ISO8601 timestamp to include data after this time.
          schema:
            type: string
        - name: to
          in: query
          required: false
          description: ISO8601 timestamp to include data before this time.
          schema:
            type: string
        - name: timezone
          in: query
          required: true
          description: IANA timezone used to bucket and format datetime values in the response.
          schema:
            type: string
        - name: plot_time_group
          in: query
          required: false
          description: "Time bucket used for plot aggregation. Accepted values: `minutes`, `hours`, `days`, `months`. Defaults to `days`."
          schema:
            type: string
            enum:
              - minutes
              - hours
              - days
              - months
        - name: versions
          in: query
          required: false
          description: List of comma separated app version identifier strings to return only matching data.
          schema:
            type: string
        - name: version_codes
          in: query
          required: false
          description: List of comma separated app version codes to return only matching data.
          schema:
            type: string
        - name: filter_short_code
          in: query
          required: false
          description: Code representing combination of filters.
          schema:
            type: string
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Series identifier, one of `sessions`, `crashes` or `anrs`.
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          datetime:
                            type: string
                          instances:
                            type: number
              examples:
                response:
                  value:
                    - id: sessions
                      data:
                        - datetime: "2024-10-02"
                          instances: 12044
                        - datetime: "2024-10-03"
                          instances: 13890
                    - id: crashes
                      data:
                        - datetime: "2024-10-02"
                          instances: 32
                    - id: anrs
                      data:
                        - datetime: "2024-10-02"
                          instances: 4
        "400":
          description: Request URI is malformed or does not meet one or more acceptance criteria. Check the `error` field for more details.
        "401":
          description: Either the user's access token is invalid or has expired.
        "403":
          description: Requester does not have access to this resource.
        "429":
          description: Rate limit of the requester has crossed maximum limits.
        "500":
          description: Measure server encountered an unfortunate error. Report this to your server administrator.
  /apps/{id}/filters:
    get:
      operationId: getAppFilters
      tags:
        - Apps
      summary: Fetch an app's filters
      description: |
        Fetch an app's filters.

        Pass `type=error` to only return filters relevant to exception events
        (fatal + nonfatal), `type=anr` for filters relevant to ANR events, or
        `type=error,anr` for filters relevant to both exceptions and ANRs. Pass
        `ud_attr_keys=1` to return user defined attribute keys. Pass `span=1`
        to return filters computed from span data instead of event data. Pass
        `builds=1` to return version filters computed from uploaded build
