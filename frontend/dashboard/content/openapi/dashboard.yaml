          in: path
          required: true
          description: Error group fingerprint.
          schema:
            type: string
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions_analyzed:
                    type: number
                  steps:
                    type: array
                    items:
                      type: object
                      properties:
                        description:
                          type: string
                        thread_name:
                          type: string
                        confidence_pct:
                          type: number
              examples:
                response:
                  value:
                    sessions_analyzed: 42
                    steps:
