  /apps/{id}/builds:
    get:
      operationId: getBuilds
      tags:
        - Apps
      summary: Fetch an app's builds
      description: |
        Fetch an app's builds, optionally filtered by upload time.

        Each build packages the mapping files uploaded for one version of the
        app: files are grouped by `version_name`, `version_code` and, for
        Over-The-Air patch uploads, `patch_id`, keeping the latest file of
        each mapping type. OTA patch builds carry a `patch_id` and empty
        version fields. Each file's `download_url` is the path of the
        download endpoint serving that mapping file.

        Builds are ordered by upload time of their newest file, newest first.
        Pass `limit` and `offset` values to paginate results; pagination
        applies to builds, not to their files.
      parameters:
        - name: id
          in: path
          required: true
          description: App's UUID.
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          description: ISO8601 timestamp to include builds uploaded after this time.
          schema:
            type: string
        - name: to
          in: query
          required: false
          description: ISO8601 timestamp to include builds uploaded before this time.
          schema:
            type: string
        - name: offset
          in: query
          required: false
          description: Number of items to skip when paginating. Use with `limit` parameter to control amount of items fetched.
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: Number of items to return. Used for pagination. Should be used along with `offset`.
          schema:
            type: integer
      responses:
        "200":
          description: Successful response, no errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      next:
                        type: boolean
                      previous:
                        type: boolean
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        version_name:
                          type: string
                          description: Empty for OTA patch builds.
                        version_code:
                          type: string
                          description: Empty for OTA patch builds.
                        patch_id:
                          type: string
                          description: OTA patch UUID. Present only for OTA patch builds.
                        last_updated:
                          type: string
                          description: Upload time of the build's newest file.
                        files:
                          type: array
                          description: The latest file of each mapping type uploaded for this build.
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              mapping_type:
                                type: string
                                description: "`proguard`, `elf_debug`, `jsbundle` or `dsym`."
                              download_url:
                                type: string
                              filesize:
                                type: number
                              last_updated:
                                type: string
